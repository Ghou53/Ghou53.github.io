<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghouse Mohideen | Systems Engineer</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
:root {
  --bg:#0a0f1c;
  --card:#11182b;
  --accent:#00ffc3;
}

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:white;
}

header {
  padding:40px;
  text-align:center;
}

h1 {
  font-size:3rem;
}

section {
  padding:40px;
}

.card {
  background:var(--card);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 0 20px rgba(0,255,195,0.1);
}

a {
  color:var(--accent);
  text-decoration:none;
}

#twin3d { height:400px; }
#mapView { height:400px; border-radius:12px; }

button {
  padding:10px 20px;
  background:var(--accent);
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>Ghouse Mohideen</h1>
  <p>Autonomous Systems | Embedded | Robotics</p>

  <p>
    <a href="mailto:your@email.com"><i class="fas fa-envelope"></i></a>
    <a href="https://www.linkedin.com/in/yourprofile" target="_blank"><i class="fab fa-linkedin"></i></a>
  </p>
</header>

<!-- DIGITAL TWIN -->
<section>
<h2>Digital Twin</h2>
<div class="card">
<canvas id="twin3d"></canvas>
</div>
</section>

<!-- CONTROL -->
<section>
<h2>Remote Control</h2>
<div class="card">
<p>Use WASD keys</p>
<div id="status">Idle</div>
</div>
</section>

<!-- MAP -->
<section>
<h2>Live Tracking</h2>
<div id="mapView"></div>
</section>

<!-- CHART -->
<section>
<h2>Telemetry</h2>
<canvas id="chart"></canvas>
</section>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ---------------- MQTT ----------------
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

let position = { x:0, z:0, rotation:0 };

// ---------------- 3D TWIN ----------------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/400, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("twin3d")});
renderer.setSize(window.innerWidth,400);

const body = new THREE.Mesh(
  new THREE.BoxGeometry(2,0.5,3),
  new THREE.MeshStandardMaterial({color:0x00ffc3})
);
scene.add(body);

const light = new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

camera.position.z=6;

function animate(){
  requestAnimationFrame(animate);
  body.position.x = position.x;
  body.rotation.y = position.rotation;
  renderer.render(scene,camera);
}
animate();

// ---------------- CONTROL ----------------
const state={};

window.addEventListener("keydown",e=>{
  if(e.key==="w") state.f=1;
  if(e.key==="s") state.f=-1;
  if(e.key==="a") state.t=1;
  if(e.key==="d") state.t=-1;

  client.publish("robot/cmd_vel", JSON.stringify({
    linear:state.f||0,
    angular:state.t||0
  }));
});

window.addEventListener("keyup",e=>{
  state.f=0; state.t=0;
  client.publish("robot/cmd_vel", JSON.stringify({linear:0,angular:0}));
});

// ---------------- MAP ----------------
const map = L.map('mapView').setView([24.2075,55.7447],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const marker = L.marker([24.2075,55.7447]).addTo(map);

client.on("message",(topic,msg)=>{
  if(topic==="robot/gps"){
    const d=JSON.parse(msg.toString());
    marker.setLatLng([d.lat,d.lon]);
    map.panTo([d.lat,d.lon]);
  }
});

client.subscribe("robot/gps");

// ---------------- CHART ----------------
const ctx=document.getElementById("chart");

const chart=new Chart(ctx,{
  type:"line",
  data:{labels:[],datasets:[{label:"Temp",data:[]}]}
});

setInterval(()=>{
  chart.data.labels.push("");
  chart.data.datasets[0].data.push(30+Math.random()*5);
  if(chart.data.labels.length>20){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }
  chart.update();
},1000);

</script>

</body>
</html>
